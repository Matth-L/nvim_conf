# =============================================================================
# kitty.conf 
# =============================================================================

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------
font_family      DepartureMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Ligatures
disable_ligatures never

# -----------------------------------------------------------------------------
# Theme — Catppuccin Latte
# -----------------------------------------------------------------------------
background            #eff1f5
foreground            #4c4f69
selection_background  #acb0be
selection_foreground  #eff1f5
cursor                #dc8a78
cursor_text_color     #eff1f5

# Black
color0  #5c5f77
color8  #6c6f85

# Red
color1  #d20f39
color9  #d20f39

# Green
color2  #40a02b
color10 #40a02b

# Yellow
color3  #df8e1d
color11 #df8e1d

# Blue
color4  #1e66f5
color12 #1e66f5

# Magenta
color5  #ea76cb
color13 #ea76cb

# Cyan
color6  #179299
color14 #179299

# White
color7  #acb0be
color15 #bcc0cc

# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------
window_padding_width    12
placement_strategy      center
hide_window_decorations no
background_opacity      0.95
dynamic_background_opacity yes

remember_window_size    yes
initial_window_width    220c
initial_window_height   50c

# -----------------------------------------------------------------------------
# Tabs
# -----------------------------------------------------------------------------
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1

active_tab_foreground   #1f1f28
active_tab_background   #7e9cd8
active_tab_font_style   bold
inactive_tab_foreground #727169
inactive_tab_background #2a2a37
inactive_tab_font_style normal

tab_title_template      " {index}: {title} "

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
cursor_shape            block
cursor_blink_interval   0

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
repaint_delay           8
input_delay             2
sync_to_monitor         yes

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell       no
visual_bell_duration    0.0
window_alert_on_bell    yes

# -----------------------------------------------------------------------------
# URLs
# -----------------------------------------------------------------------------
url_style               curly
url_color               #7e9cd8
open_url_with           default
detect_urls             yes

# -----------------------------------------------------------------------------
# Splits & layouts (sysadmin friendly)
# -----------------------------------------------------------------------------
enabled_layouts         tall, fat, grid, horizontal, vertical, stack

# -----------------------------------------------------------------------------
# Keymaps
# -----------------------------------------------------------------------------

# Splits
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+d        close_window
map ctrl+shift+h        neighboring_window left
map ctrl+shift+l        neighboring_window right
map ctrl+shift+k        neighboring_window up
map ctrl+shift+j        neighboring_window down

# Layouts
map ctrl+shift+space    next_layout

# Tabs
map ctrl+t              new_tab_with_cwd
map ctrl+w              close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+,        move_tab_backward
map ctrl+shift+.        move_tab_forward

# Font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

# Scrollback
map ctrl+shift+g        show_scrollback

# Opacity
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1.0

# Copy / Paste
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# -----------------------------------------------------------------------------
# Mouse
# -----------------------------------------------------------------------------
mouse_hide_wait         3.0
click_interval          0.5
focus_follows_mouse     no

# -----------------------------------------------------------------------------
# Shell
# -----------------------------------------------------------------------------
shell                   .
editor                  nvim
close_on_child_death    no
allow_remote_control    yes
